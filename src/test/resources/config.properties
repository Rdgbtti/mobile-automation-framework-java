# ===================================
# Mobile Automation Framework Config
# ===================================

# Ambiente
environment=local
platform=Android

# Android Configuration
android.app.path=
android.auto.grant.permissions=true
android.device.udid=emulator-5554
android.platform.version=14
android.app.package=com.example.app
android.app.activity=.MainActivity

# iOS Configuration (quando necessário)
ios.device.name=
ios.platform.version=17.0
ios.bundle.id=com.example.app

# Appium Server
appium.server.url=http://127.0.0.1:4723
appium.server.port=4723

# Timeouts
implicit.wait=10
explicit.wait=15
page.load.timeout=30

# Browser Configuration (se necessário)
chrome.driver.path=
firefox.driver.path=

# Relatórios
reports.dir=target/reports
allure.results.dir=target/allure-results

# Logging
log.level=INFO
log.file=logs/automation.log

