name: Mobile Automation Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Executa diariamente às 2 AM

jobs:
  test:
    name: Run Mobile Automation Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java-version: [ 17 ]
        maven-version: [ 3.8.1 ]

    steps:
      # 1. Checkout do código
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. Setup Java
      - name: Set up Java ${{ matrix.java-version }}
        uses: actions/setup-java@v3
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      # 3. Validar Maven
      - name: Validate Maven
        run: |
          mvn --version
          java -version

      # 4. Build do Projeto
      - name: Build with Maven
        run: mvn clean compile
        continue-on-error: true

      # 5. Executar Testes
      - name: Run Tests
        run: mvn clean test -DskipTests=false
        continue-on-error: true

      # 6. Gerar Allure Report
      - name: Generate Allure Report
        if: always()
        run: mvn allure:report
        continue-on-error: true

      # 7. Upload Allure Report
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: allure-report-${{ github.run_number }}
          path: target/allure-report/
          retention-days: 30

      # 8. Upload Test Results
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ github.run_number }}
          path: target/surefire-reports/
          retention-days: 30

      # 9. Upload Logs
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: logs-${{ github.run_number }}
          path: logs/
          retention-days: 30

      # 10. Publicar Resultados do Teste
      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: target/surefire-reports/TEST-*.xml
          check_name: Test Results
          comment_title: Mobile Automation Test Report
        continue-on-error: true

      # 11. GitHub Pages Deploy (opcional)
      - name: Deploy Allure Report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/allure-report/
          user_name: 'GitHub Actions'
          user_email: 'actions@github.com'
        continue-on-error: true

  # Job para comentar resultados no PR
  comment-pr:
    name: Comment PR with Results
    runs-on: ubuntu-latest
    needs: test
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v3

      - name: Comment PR
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const testResultsPath = fs.readdirSync('.')
              .filter(f => f.startsWith('test-results-'))
              .map(f => `${f}/TEST-*.xml`)
              .join(', ');
            
            const comment = `## 📊 Mobile Automation Test Results
            
            ### ✅ Tests Executed on: ${new Date().toLocaleString()}
            
            - **Java Version**: 17
            - **Platform**: Android/iOS
            - **Run Number**: ${{ github.run_number }}
            
            [📈 View Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            Artifacts uploaded:
            - Allure Report
            - Test Results
            - Logs
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
        continue-on-error: true

